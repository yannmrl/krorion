<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="styles.css" />
        <script type="text/javascript" src="script.js" defer=""></script>
    </head>
    <body>
        <div id="label"></div>

        <div class="auction-container">
            <img src="" alt="Lot en cours">
            <h1>Lot en cours : </h1>
            <p style="margin: 0" id="fin">Fin : xx/xx</p>
            <p class="current-bid" id="currentBid">Enchère actuelle : K0</p>

            <div class="bid-input">
                <input type="number" id="bidAmount" placeholder="Ton offre (K)">
                <button id="placeBid">Enchérir</button>
            </div>

            <div class="bids-list">
                <h2>Historique des enchères</h2>
                <ul id="bidsHistory">
                <!--<li><strong>Alice</strong> : 150 €</li>-->
                </ul>
            </div>
        </div>
    </body>
</html>

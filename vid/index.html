<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="styles.css" />
        <script type="text/javascript" src="script.js" defer=""></script>
    </head>
    <body>

        <div style="display: none;" class="player-container">
            <video id="video" preload="metadata"></video>
            <div id="overlay-end"><img src="../assets/img/fugitliste.png"></div>
            <div id="fullscreen-exit">✕</div>
            <label id="trailern"></label>
            <div id="playpause">
                <svg 
                    onclick="userplay()"
                    style="display: none"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none">
                    <path
                        d="M16.6582 9.28638C18.098 10.1862 18.8178 10.6361 19.0647 11.2122C19.2803 11.7152 19.2803 12.2847 19.0647 12.7878C18.8178 13.3638 18.098 13.8137 16.6582 14.7136L9.896 18.94C8.29805 19.9387 7.49907 20.4381 6.83973 20.385C6.26501 20.3388 5.73818 20.0469 5.3944 19.584C5 19.053 5 18.1108 5 16.2264V7.77357C5 5.88919 5 4.94701 5.3944 4.41598C5.73818 3.9531 6.26501 3.66111 6.83973 3.6149C7.49907 3.5619 8.29805 4.06126 9.896 5.05998L16.6582 9.28638Z"
                        stroke="black"
                        stroke-width="2"
                        stroke-linejoin="round"
                        stroke-linecap="round"/>
                </svg>
                <svg
                    onclick="userpause()"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none">
                    <path
                        d="M8 5V19M16 5V19"
                        stroke="black"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"/>
                </svg>
                <input id="tvslider" type="range" min="0" max="1000" onchange="slideend()" oninput="slide(this.value)" onpointerdown="slidebegin()">
            </div>
        </div>

        <div class="container">
            <header>
                <div class="logo">
                    <div>
                        <div class="title">Krorion TV</div>
                        <div class="subtitle">Les vid&eacute;os de la <span style="color: #053a81">Fugitliste</span></div>
                    </div>
                </div>
            </header>

            <div id="label"></div>       

            <main>
                <section class="products" aria-labelledby="catalog">
                    <h2 id="catalog" style="margin: 0 0 12px 0"></h2>
                    <div class="grid" id="productsGrid" role="list">
                        
                    </div>
                </section>
            </main>
        </div>

    </body>
</html>
